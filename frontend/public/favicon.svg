  <circle cx="330" cy="350" r="44" fill="#ef4444" />
  <text x="330" y="358" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="900" fill="#ffffff" text-anchor="middle">PDF</text>
