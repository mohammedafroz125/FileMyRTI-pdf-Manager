      <stop offset="0%" stop-color="#1e40af" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>

  <!-- Background Shield Container -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bgGrad)" />

  <!-- Document Base -->
  <path d="M140 110 C140 98 149 89 161 89 L290 89 L372 171 L372 401 C372 413 363 422 351 422 L161 422 C149 422 140 413 140 401 Z" fill="url(#docGrad)" />

