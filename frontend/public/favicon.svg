  <text x="256" y="185" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="2">FILE MY RTI</text>

  <!-- Document Text Lines -->
  <rect x="170" y="225" width="172" height="14" rx="7" fill="#94a3b8" />
  <rect x="170" y="255" width="140" height="14" rx="7" fill="#cbd5e1" />
  <rect x="170" y="285" width="160" height="14" rx="7" fill="#cbd5e1" />

